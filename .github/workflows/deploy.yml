name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'sites/**'
      - 'infra/workers/proxy/worker.js'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      site:
        description: 'Site name (directory under sites/); leave blank to auto-detect changed sites'
        required: false
        type: string
  # Cross-repo: fired by FilOzone/synapse-sdk when the SDK changes (see
  # docs/cross-repo/). Only rebuilds the docs site, with a fresh typedoc pull
  # from synapse-sdk.
  repository_dispatch:
    types: [sdk-released]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NOVA_VERSION: "latest"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.pick.outputs.sites }}
      worker_changed: ${{ steps.pick.outputs.worker_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - id: pick
        run: |
          # Cross-repo dispatch from synapse-sdk: rebuild docs only.
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo 'sites=["docs"]' >> "$GITHUB_OUTPUT"
            echo "worker_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "${{ github.event.inputs.site }}" ]]; then
            echo "sites=[\"${{ github.event.inputs.site }}\"]" >> "$GITHUB_OUTPUT"
            echo "worker_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sites=$(git diff --name-only HEAD~1 HEAD -- sites/ \
            | cut -d/ -f2 | sort -u \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "sites=$sites" >> "$GITHUB_OUTPUT"

          worker_changed=false
          if git diff --name-only HEAD~1 HEAD | grep -q '^infra/workers/proxy/worker\.js$'; then
            worker_changed=true
          fi
          echo "worker_changed=$worker_changed" >> "$GITHUB_OUTPUT"

  deploy-worker:
    needs: detect
    if: needs.detect.outputs.worker_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Upload shared Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FILBEAM_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_FILBEAM_ACCOUNT_ID }}
          FILBEAM_D1_TOKEN: ${{ secrets.CLOUDFLARE_FILBEAM_TOKEN }}
          D1_MAINNET: ${{ secrets.CLOUDFLARE_D1_MAINNET }}
          D1_CALIBRATION: ${{ secrets.CLOUDFLARE_D1_CALIBRATION }}
        run: infra/workers/proxy/deploy-worker.sh

  deploy-sites:
    needs: [detect, deploy-worker]
    if: |
      !failure() && !cancelled()
      && needs.detect.outputs.sites != '[]'
      && needs.detect.outputs.sites != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.detect.outputs.sites) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sites/${{ matrix.site }}/package-lock.json

      - name: Install Nova CLI
        run: npm install -g "filecoin-nova@${NOVA_VERSION}"

      # docs site only: regenerate typedoc Reference tree from synapse-sdk so
      # docs.filecoin.cloud stays in sync with the latest published SDK. See
      # docs/cross-repo/ for the cross-repo dispatch plan.
      - name: Fetch Reference from synapse-sdk
        if: matrix.site == 'docs'
        run: |
          set -euo pipefail
          SDK_REF="${{ github.event.client_payload.sha || 'main' }}"
          echo "Cloning FilOzone/synapse-sdk @ $SDK_REF ..."
          git clone --depth 1 https://github.com/FilOzone/synapse-sdk /tmp/synapse-sdk
          if [[ "$SDK_REF" != "main" ]]; then
            git -C /tmp/synapse-sdk fetch --depth 1 origin "$SDK_REF"
            git -C /tmp/synapse-sdk checkout FETCH_HEAD
          fi
          npm install -g pnpm@10
          cd /tmp/synapse-sdk
          pnpm install
          # Build just the docs site — typedoc runs during this build and
          # emits src/content/docs/reference/*.
          cd docs
          NODE_OPTIONS="--localstorage-file=.astro-localstorage.json" pnpm run build
          REF_SRC=/tmp/synapse-sdk/docs/src/content/docs/reference
          REF_DST=$GITHUB_WORKSPACE/sites/docs/src/content/docs/reference
          rm -rf "$REF_DST"
          cp -r "$REF_SRC" "$REF_DST"
          echo "Copied $(find "$REF_DST" -type f | wc -l) reference files"

      - name: Build site
        working-directory: sites/${{ matrix.site }}
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_FILBEAM_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_FILBEAM_ACCOUNT_ID }}
          CLOUDFLARE_D1_MAINNET: ${{ secrets.CLOUDFLARE_D1_MAINNET }}
          CLOUDFLARE_D1_CALIBRATION: ${{ secrets.CLOUDFLARE_D1_CALIBRATION }}
        run: |
          npm ci
          # Run astro check only if the site's package.json declares a `check` script
          if jq -e '.scripts.check' package.json >/dev/null 2>&1; then
            npm run check
          fi
          npm run build

      - name: Deploy to FOC
        id: nova
        working-directory: sites/${{ matrix.site }}
        env:
          NOVA_PIN_KEY: ${{ secrets.NOVA_PIN_KEY }}
          NOVA_WALLET_ADDRESS: ${{ secrets.NOVA_WALLET_ADDRESS }}
        run: |
          nova deploy dist --json > nova-output.json
          CID=$(jq -er .cid nova-output.json)
          echo "cid=$CID" >> "$GITHUB_OUTPUT"
          echo "Deployed CID: $CID"

      - name: Update Worker KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: infra/workers/proxy/deploy-site.sh ${{ matrix.site }} "${{ steps.nova.outputs.cid }}"

      - name: Update DNSLink TXT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: infra/workers/proxy/dnslink.sh ${{ matrix.site }} "${{ steps.nova.outputs.cid }}"

      - name: Update ENS contenthash
        env:
          NOVA_ENS_KEY: ${{ secrets.NOVA_ENS_KEY }}
          NOVA_RPC_URL: ${{ secrets.NOVA_RPC_URL }}
        run: |
          ENS_NAME=$(jq -er .ens_name sites/${{ matrix.site }}/deploy.json)
          for attempt in 1 2 3; do
            if nova ens "${{ steps.nova.outputs.cid }}" --ens "$ENS_NAME"; then
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "nova ens attempt $attempt failed; retrying in 15s (RPC load-balancer lag is common)..."
              sleep 15
            fi
          done
          exit 1
