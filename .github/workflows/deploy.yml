name: Deploy
on:
  push:
    branches: [main]
    paths: ['sites/**']
  workflow_dispatch:
jobs:
  deploy:
    uses: FilOzone/filecoin-nova/.github/workflows/deploy-sites.yml@v0.7.1
    with:
      # Filbeam dashboard sites read these at build time.
      build_env: |
        CLOUDFLARE_FILBEAM_TOKEN=${{ secrets.CLOUDFLARE_FILBEAM_TOKEN }}
        CLOUDFLARE_FILBEAM_ACCOUNT_ID=${{ secrets.CLOUDFLARE_FILBEAM_ACCOUNT_ID }}
        CLOUDFLARE_D1_MAINNET=${{ secrets.CLOUDFLARE_D1_MAINNET }}
        CLOUDFLARE_D1_CALIBRATION=${{ secrets.CLOUDFLARE_D1_CALIBRATION }}
    secrets: inherit
