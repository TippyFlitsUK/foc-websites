name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'sites/**'
      - 'infra/workers/proxy/worker.js'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      site:
        description: 'Site name (directory under sites/); leave blank to auto-detect changed sites'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NOVA_VERSION: "latest"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.pick.outputs.sites }}
      worker_changed: ${{ steps.pick.outputs.worker_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: pick
        run: |
          if [[ -n "${{ github.event.inputs.site }}" ]]; then
            echo "sites=[\"${{ github.event.inputs.site }}\"]" >> "$GITHUB_OUTPUT"
            echo "worker_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sites=$(git diff --name-only HEAD~1 HEAD -- sites/ \
            | cut -d/ -f2 | sort -u \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "sites=$sites" >> "$GITHUB_OUTPUT"

          worker_changed=false
          if git diff --name-only HEAD~1 HEAD | grep -q '^infra/workers/proxy/worker\.js$'; then
            worker_changed=true
          fi
          echo "worker_changed=$worker_changed" >> "$GITHUB_OUTPUT"

  deploy-worker:
    needs: detect
    if: needs.detect.outputs.worker_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload shared Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: infra/workers/proxy/deploy-worker.sh

  deploy-sites:
    needs: [detect, deploy-worker]
    if: |
      !failure() && !cancelled()
      && needs.detect.outputs.sites != '[]'
      && needs.detect.outputs.sites != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.detect.outputs.sites) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sites/${{ matrix.site }}/package-lock.json

      - name: Install Nova CLI
        run: npm install -g "filecoin-nova@${NOVA_VERSION}"

      - name: Build site
        working-directory: sites/${{ matrix.site }}
        run: |
          npm ci
          npm run build

      - name: Deploy to FOC
        id: nova
        working-directory: sites/${{ matrix.site }}
        env:
          NOVA_PIN_KEY: ${{ secrets.NOVA_PIN_KEY }}
          NOVA_WALLET_ADDRESS: ${{ secrets.NOVA_WALLET_ADDRESS }}
        run: |
          nova deploy dist --json > nova-output.json
          CID=$(jq -er .cid nova-output.json)
          echo "cid=$CID" >> "$GITHUB_OUTPUT"
          echo "Deployed CID: $CID"

      - name: Update Worker KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: infra/workers/proxy/deploy-site.sh ${{ matrix.site }} "${{ steps.nova.outputs.cid }}"

      - name: Update DNSLink TXT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: infra/workers/proxy/dnslink.sh ${{ matrix.site }} "${{ steps.nova.outputs.cid }}"

      - name: Update ENS contenthash
        env:
          NOVA_ENS_KEY: ${{ secrets.NOVA_ENS_KEY }}
          NOVA_RPC_URL: ${{ secrets.NOVA_RPC_URL }}
        run: |
          ENS_NAME=$(jq -er .ens_name sites/${{ matrix.site }}/deploy.json)
          nova ens "${{ steps.nova.outputs.cid }}" --ens "$ENS_NAME"
